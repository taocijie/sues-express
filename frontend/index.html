<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SUES 校园快递</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container" id="app">
    
    <!-- ===== Entry Page ===== -->
    <div class="page active" id="page-entry">
      <div class="entry-header">
        <span class="admin-badge" onclick="showAuth('admin')">⚙️ 管理</span>
      </div>
      <div class="entry-grid">
        <div class="app-brand">
          <span class="logo">📦</span>
          <div class="entry-title">SUES 校园快递</div>
          <div class="entry-subtitle">上海工程技术大学 · 校园内</div>
        </div>
        <button class="entry-btn pickup" onclick="showAuth('publisher')">
          <span class="icon">📮</span>
          <span class="btn-label">我要取件</span>
          <span class="btn-desc">发布取件订单 · 等待接单</span>
        </button>
        <button class="entry-btn delivery" onclick="showAuth('delivery')">
          <span class="icon">🚚</span>
          <span class="btn-label">我要接单</span>
          <span class="btn-desc">接单配送 · 赚取报酬</span>
        </button>
      </div>
    </div>

    <!-- ===== Auth Page ===== -->
    <div class="page" id="page-auth">
      <div class="top-nav">
        <span class="back-btn" onclick="showEntry()">‹</span>
        <span class="title" id="auth-title">登录</span>
      </div>
      <div style="padding: 20px 16px;">
        <input type="hidden" id="auth-target-role" value="publisher">
        <input type="hidden" id="auth-mode" value="login">
        <div id="auth-form">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="auth-username" placeholder="请输入用户名">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="auth-password" placeholder="请输入密码">
          </div>
          <div class="form-group" id="auth-phone-group" style="display:none">
            <label>手机号</label>
            <input type="tel" id="auth-phone" placeholder="请输入手机号">
          </div>
          <button class="btn btn-primary btn-block mt-16" id="auth-submit-btn" onclick="handleAuth()">登录</button>
          <p class="text-center mt-16">
            <span style="font-size:13px;color:var(--text-secondary);cursor:pointer" id="auth-toggle" onclick="toggleAuthMode()">没有账号？去注册</span>
          </p>
        </div>
      </div>
    </div>

    <!-- ===== Publisher Page ===== -->
    <div class="page" id="page-publisher">
      <div class="top-nav">
        <span class="back-btn" onclick="showEntry()">‹</span>
        <span class="title">📮 取件</span>
        <span style="font-size:13px;cursor:pointer" onclick="logout()">退出</span>
      </div>
      <div class="page-tabs">
        <div class="page-tab active" onclick="switchPubTab('publish')">发布订单</div>
        <div class="page-tab" onclick="switchPubTab('myorders')">我的订单</div>
      </div>
      <div id="pub-publish">
      <div class="price-card"><div style="font-size:13px;font-weight:600;margin-bottom:8px;">💰 价格表</div>
        <div class="row"><span>0-0.5kg</span><span style="font-weight:600;">¥2</span></div>
        <div class="row"><span>0.5-1kg</span><span style="font-weight:600;">¥4</span></div>
        <div class="row"><span>1-2kg</span><span style="font-weight:600;">¥6</span></div>
        <div class="row"><span>2-5kg</span><span style="font-weight:600;">¥10</span></div>
        <div class="row" style="border-top:1px solid var(--border);padding-top:6px;margin-top:6px;"><span>超过5kg每kg加</span><span style="font-weight:600;">¥2</span></div>
      </div>
      <div class="card" style="margin-top:12px;">
        <div class="form-group">
          <label>取件地址</label>
          <input type="text" id="pub-pickup-addr" placeholder="如：三期宿舍14号楼">
        </div>
        <div class="form-group">
          <label>取件码</label>
          <input type="text" id="pub-pickup-code" placeholder="取货验证码/密码">
        </div>
        <div class="form-group">
          <label>送达地址</label>
          <input type="text" id="pub-delivery-addr" placeholder="如：教学楼A座">
        </div>
        <div class="form-group">
          <label>快递编号</label>
          <input type="text" id="pub-tracking" placeholder="快递单号">
        </div>
        <div class="form-group">
          <label>重量（kg，超过5kg每kg加¥2）</label>
          <input type="number" id="pub-weight" placeholder="0" step="0.1" min="0">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="pub-notes" placeholder="其他说明..."></textarea>
        </div>
        <div id="pub-price-preview" style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
          预估价格：¥<span id="pub-price-amount">2.00</span>
          <span id="pub-payment-type"></span>
        </div>
        <button class="btn btn-primary btn-block" onclick="publishOrder()">发布订单</button>
      </div>
      </div>
      <div id="pub-myorders" style="display:none">
        <div class="filter-tabs">
          <span class="filter-tab active" onclick="filterMyOrders('all',this)">全部</span>
          <span class="filter-tab" onclick="filterMyOrders('pending',this)">待接单</span>
          <span class="filter-tab" onclick="filterMyOrders('accepted',this)">已接单</span>
          <span class="filter-tab" onclick="filterMyOrders('completed',this)">已完成</span>
        </div>
        <div id="pub-orders-list"></div>
      </div>
    </div>

    <!-- ===== Delivery Page ===== -->
    <div class="page" id="page-delivery">
      <div class="top-nav">
        <span class="back-btn" onclick="showEntry()">‹</span>
        <span class="title">🚚 接单</span>
        <span style="font-size:13px;cursor:pointer" onclick="logout()">退出</span>
      </div>
      <div class="page-tabs">
        <div class="page-tab active" onclick="switchDelTab('available')">可接订单</div>
        <div class="page-tab" onclick="switchDelTab('mine')">我的接单</div>
      </div>
      <div id="del-available">
        <div id="del-orders-list"></div>
      </div>
      <div id="del-mine" style="display:none">
        <div class="filter-tabs">
          <span class="filter-tab active" onclick="filterMyDeliveries('all',this)">全部</span>
          <span class="filter-tab" onclick="filterMyDeliveries('accepted',this)">进行中</span>
          <span class="filter-tab" onclick="filterMyDeliveries('completed',this)">已完成</span>
        </div>
        <div id="del-mine-list"></div>
      </div>
    </div>

    <!-- ===== Admin Page ===== -->
    <div class="page" id="page-admin">
      <div class="top-nav">
        <span class="back-btn" onclick="showEntry()">‹</span>
        <span class="title">⚙️ 管理后台</span>
        <span style="font-size:13px;cursor:pointer" onclick="logout()">退出</span>
      </div>
      <div class="stats-grid" id="admin-stats"></div>
      <div class="page-tabs">
        <div class="page-tab active" onclick="switchAdminTab('dashboard',this)">概览</div>
        <div class="page-tab" onclick="switchAdminTab('verify',this)">认证审核</div>
        <div class="page-tab" onclick="switchAdminTab('orders',this)">订单管理</div>
        <div class="page-tab" onclick="switchAdminTab('users',this)">用户管理</div>
      </div>
      <div id="admin-dashboard">
        <div id="admin-dash-content"></div>
      </div>
      <div id="admin-verify" style="display:none">
        <div id="admin-verify-list"></div>
      </div>
      <div id="admin-orders" style="display:none">
        <div id="admin-orders-list"></div>
      </div>
      <div id="admin-users" style="display:none">
        <div id="admin-users-list"></div>
      </div>
    </div>

    <!-- ===== Order Detail Page ===== -->
    <div class="page" id="page-order-detail">
      <div class="top-nav">
        <span class="back-btn" onclick="closeDetail()">‹</span>
        <span class="title">订单详情</span>
      </div>
      <div id="order-detail-content" style="padding: 12px 0;"></div>
    </div>

  </div>

  <!-- ===== Modal ===== -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content" id="modal-body"></div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js?v=1781488685"></script>
</body>
</html>
